<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; }
  .signature { display: inline-block; border-left: 4px solid #2563EB; padding: 12px 20px; background: #ffffff; max-width: 480px; }
  .name { font-size: 16px; font-weight: bold; color: #1E3A5F; margin-bottom: 2px; }
  .position { font-size: 13px; color: #2563EB; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .divider { border: none; border-top: 1px solid #E2E8F0; margin: 8px 0; }
  .contact { font-size: 12px; color: #64748B; margin-top: 6px; line-height: 1.6; }
  .contact span { color: #1E3A5F; font-weight: 600; }
  .company { font-size: 11px; color: #94A3B8; margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="signature">
  <div class="name">{{name}}</div>
  <div class="position">{{position}}</div>
  <hr class="divider">
  <div class="contact">
    <span>Phone:</span> {{phone}}<br>
    <span>Email:</span> {{email}}
  </div>
  <div class="company">Your Company &bull; www.yourcompany.com</div>
</div>
</body>
</html>
