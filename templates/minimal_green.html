<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; }
  .signature { display: inline-flex; gap: 20px; padding: 14px 0; max-width: 560px; border-top: 1px solid #eeeeee; }
  .left { display: flex; flex-direction: column; justify-content: center; padding-right: 20px; border-right: 2px solid #10B981; min-width: 150px; }
  .name { font-size: 15px; font-weight: 700; color: #111827; }
  .position { font-size: 11px; color: #10B981; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; font-weight: 600; }
  .right { font-size: 12px; color: #6B7280; line-height: 1.8; display: flex; flex-direction: column; justify-content: center; }
  .right strong { color: #374151; }
  .tag { display: inline-block; background: #F0FDF4; color: #065F46; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 12px; margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="signature">
  <div class="left">
    <div class="name">{{name}}</div>
    <div class="position">{{position}}</div>
  </div>
  <div class="right">
    <div><strong>Phone</strong>&ensp;{{phone}}</div>
    <div><strong>Email</strong>&ensp;{{email}}</div>
    <div class="tag">Your Company</div>
  </div>
</div>
</body>
</html>
